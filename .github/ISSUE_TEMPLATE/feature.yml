name: Feature request
description: Suggest an idea or improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! For open-ended questions or discussion,
        consider starting a thread in
        [pydisplay Discussions](https://github.com/PyDevices/pydisplay/discussions)
        instead.

  - type: input
    id: repo-area
    attributes:
      label: Repo / area
      description: Which repo (or part of a repo) is this about?
      placeholder: e.g. lv_bindings / regenerate_lvpy.sh
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do, and what's missing or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Alternatives you've considered?
    validations:
      required: false
